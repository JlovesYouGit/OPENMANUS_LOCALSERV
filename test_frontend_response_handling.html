<!DOCTYPE html>
<html>
<head>
    <title>Frontend Response Handling Test</title>
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; }
        .chat-history { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { padding: 10px; margin: 5px 0; border-radius: 5px; max-width: 80%; }
        .user-message { background-color: #007bff; color: white; margin-left: auto; }
        .agent-message { background-color: #f8f9fa; border: 1px solid #dee2e6; }
        .tool-message { background-color: #d4edda; border-left: 4px solid #28a745; }
        .input-area { display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 10px; }
        #send-button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        #send-button:disabled { background-color: #6c757d; }
        .loading { display: none; color: #007bff; }
        .status { padding: 10px; text-align: center; }
        .error { color: #dc3545; }
        .response-quality { font-size: 0.8em; color: #666; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Frontend Response Handling Test</h1>
        <div class="status" id="status">Ready</div>
        <div class="chat-history" id="chat-history"></div>
        <div class="loading" id="loading">Processing...</div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here...">
            <button id="send-button" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Add message to chat history
        function addMessage(content, isUser, isTool = false, quality = null) {
            const chatHistory = document.getElementById('chat-history');
            const messageDiv = document.createElement('div');
            
            if (isTool) {
                messageDiv.className = 'message tool-message';
                messageDiv.innerHTML = '<span class="tool-indicator">TOOL</span> ' + content;
            } else {
                messageDiv.className = `message ${isUser ? 'user-message' : 'agent-message'}`;
                messageDiv.textContent = content;
            }
            
            // Add quality indicator if provided
            if (quality && !isUser && !isTool) {
                const qualitySpan = document.createElement('span');
                qualitySpan.className = 'response-quality';
                qualitySpan.textContent = `Quality: ${(quality.overall * 100).toFixed(0)}%`;
                messageDiv.appendChild(qualitySpan);
            }
            
            chatHistory.appendChild(messageDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
        
        // Show loading indicator
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('send-button').disabled = true;
        }
        
        // Hide loading indicator
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('send-button').disabled = false;
        }
        
        // Update status message
        function updateStatus(message, isError = false) {
            const statusElement = document.getElementById('status');
            statusElement.textContent = message;
            statusElement.className = isError ? 'status error' : 'status';
        }
        
        // Enhanced sendMessage function with better error handling
        async function sendMessage() {
            const inputElement = document.getElementById('user-input');
            const message = inputElement.value.trim();
            
            if (!message) return;
            
            showLoading();
            updateStatus('Processing your request...');
            
            try {
                // Simulate sending to backend
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Simulate different response types
                let response;
                if (message.includes('error')) {
                    response = { success: false, error: "Simulated backend error" };
                } else if (message.includes('long')) {
                    // Simulate a very long response
                    const longResponse = "This is a very long response to test how the frontend handles long messages. ".repeat(20) + 
                                       "This is the end of the long response.";
                    response = { 
                        success: true, 
                        response: longResponse,
                        quality: { overall: 0.85 }
                    };
                } else if (message.includes('empty')) {
                    response = { success: true, response: "" };
                } else if (message.includes('null')) {
                    response = { success: true };
                } else {
                    response = { 
                        success: true, 
                        response: `Echo: ${message}`,
                        quality: { overall: 0.9 }
                    };
                }
                
                if (response.success) {
                    // Only add user message to chat after successful submission
                    addMessage(message, true);
                    inputElement.value = '';
                    
                    // Handle potentially long responses
                    const responseText = response.response || "No response received";
                    addMessage(responseText, false, false, response.quality);
                    updateStatus('Response received');
                } else {
                    const errorMessage = response.error || "Unknown error occurred";
                    addMessage(`Error: ${errorMessage}`, false, true);
                    updateStatus('Error occurred', true);
                    // Clear input only if it was a validation error
                    if (response.error !== "No message provided") {
                        inputElement.value = '';
                    }
                }
            } catch (error) {
                console.error('Error sending message:', error);
                addMessage(`Error: ${error.message || 'Unknown network error'}`, false, true);
                updateStatus('Network error', true);
                // Don't clear the input on network errors so user can retry
            } finally {
                hideLoading();
            }
        }
        
        // Handle Enter key press
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Add test buttons
        window.onload = function() {
            const container = document.querySelector('.container');
            
            const testButtons = document.createElement('div');
            testButtons.innerHTML = `
                <div style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;">
                    <h3>Test Scenarios</h3>
                    <button onclick="testNormalResponse()">Test Normal Response</button>
                    <button onclick="testLongResponse()">Test Long Response</button>
                    <button onclick="testEmptyResponse()">Test Empty Response</button>
                    <button onclick="testNullResponse()">Test Null Response</button>
                    <button onclick="testError()">Test Error Response</button>
                    <button onclick="clearChat()">Clear Chat</button>
                    <br><br>
                    <input type="text" id="custom-message" placeholder="Enter custom message">
                    <button onclick="sendCustomMessage()">Send Custom</button>
                </div>
            `;
            container.appendChild(testButtons);
        };
        
        // Test functions
        function testNormalResponse() {
            document.getElementById('user-input').value = "Hello, this is a normal message";
            sendMessage();
        }
        
        function testLongResponse() {
            document.getElementById('user-input').value = "long response test";
            sendMessage();
        }
        
        function testEmptyResponse() {
            document.getElementById('user-input').value = "empty response test";
            sendMessage();
        }
        
        function testNullResponse() {
            document.getElementById('user-input').value = "null response test";
            sendMessage();
        }
        
        function testError() {
            document.getElementById('user-input').value = "error test";
            sendMessage();
        }
        
        function sendCustomMessage() {
            const customMessage = document.getElementById('custom-message').value;
            if (customMessage) {
                document.getElementById('user-input').value = customMessage;
                sendMessage();
            }
        }
        
        function clearChat() {
            document.getElementById('chat-history').innerHTML = '';
            document.getElementById('user-input').value = '';
            updateStatus('Ready');
        }
    </script>
</body>
</html>
